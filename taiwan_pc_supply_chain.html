<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    background: #f7f7f5;
    color: #1a1a18;
    min-height: 100vh;
    padding: 2rem 1rem;
  }
  .container { max-width: 900px; margin: 0 auto; }
  .header { margin-bottom: 2rem; }
  .header h1 { font-size: 22px; font-weight: 500; color: #1a1a18; margin-bottom: 6px; }
  .header p { font-size: 13px; color: #6b6b67; }
  .chain { display: flex; gap: 0; align-items: stretch; }
  .tier { flex: 1; min-width: 0; }

    font-size: 13px;
    font-weight: 500;
    text-align: center;
  }

    color: #1a1a18;

    text-align: left;

  .item-btn.active-amber { border-color: #BA7517; background: #FAEEDA; color: #633806; }
  .arrow {
    display: flex; align-items: center; padding: 0 6px;
    align-self: center;
  }
  .arrow svg { opacity: 0.35; }
  .panel {
    margin-top: 1.25rem;
    background: #ffffff;
    border: 0.5px solid #d3d1c7;
    border-radius: 12px;
    padding: 1.25rem;
    min-height: 130px;
  }

  .panel-title { font-size: 16px; font-weight: 500; color: #1a1a18; margin-bottom: 4px; }
  .panel-desc { font-size: 13px; color: #6b6b67; margin-bottom: 14px; }
  .companies { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
  .co-chip {
    padding: 5px 13px;
    border-radius: 99px;
    font-size: 13px;
    border: 0.5px solid;
    font-family: inherit;
  }
  .chip-blue  { background: #E6F1FB; border-color: #B5D4F4; color: #0C447C; }
  .chip-teal  { background: #E1F5EE; border-color: #9FE1CB; color: #085041; }
  .chip-amber { background: #FAEEDA; border-color: #FAC775; color: #633806; }
  .note { font-size: 12px; color: #888780; line-height: 1.7; border-top: 0.5px solid #eeede7; padding-top: 10px; }
  .legend { display: flex; gap: 16px; margin-bottom: 1rem; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #6b6b67; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
  @media (max-width: 600px) {
    .chain { flex-direction: column; gap: 8px; }
    .arrow { transform: rotate(90deg); align-self: center; padding: 4px 0; }
    .tier-items { min-height: auto; }
  }
  .source {
    margin-top: 1.5rem;
    font-size: 11px;
    color: #b4b2a9;

</style>

</div>

const activeClass = { up: 'active-blue', mid: 'active-teal', down: 'active-amber' };
const chipClass   = { up: 'chip-blue',   mid: 'chip-teal',   down: 'chip-amber' };

function render(tierId, items) {
  const el = document.getElementById('tier-' + tierId);
  items.forEach((item, i) => {
    const btn = document.createElement('button');
    btn.className = 'item-btn';
    btn.textContent = item.name;
    btn.onclick = () => showPanel(item, btn, tierId);
    el.appendChild(btn);
  });
}

function showPanel(item, btn, tierId) {
  document.querySelectorAll('.item-btn').forEach(b => {
    b.classList.remove('active-blue', 'active-teal', 'active-amber');
  });
  btn.classList.add(activeClass[tierId]);
  const panel = document.getElementById('panel');
  const cc = chipClass[tierId];
  panel.innerHTML = `
    <div class="panel-title">${item.name}</div>
    <div class="panel-desc">${item.desc}</div>
    <div class="companies">${item.companies.map(c => `<span class="co-chip ${cc}">${c}</span>`).join('')}</div>
    ${item.note ? `<div class="note">${item.note}</div>` : ''}
  `;
}

render('up', data.up);
render('mid', data.mid);
render('down', data.down);
